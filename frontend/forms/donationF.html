<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Budget</title>
    <link rel="icon" href="../images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
<header>
     <h2>Make Your Donation</h2>
</header>
<nav class="form-nav">  
      <li><a href="../../donor/donate.html">home</a></li>
      <li><a href="../../">logout</a></li>
    </nav>
<main>
    <section class="form-section">
    <form action="../../backend/forms/donationF.php" method="post">
        <label for="email">email:</email>
        <input type="text" id="email" name="email" required  pattern="[a-zA-Z0-9]+@lbcngo\.com" placeholder="person@lbcngo.com"input><br>
        <label for="number">amount(USD):</label>
        <input type="number" id="amount" name="number" min="5"required><br>
        <label for="password">password:</email>
        <input type="password" id="password" name="password" value="password"required><br>
        <input type="submit" value="Submit">
    </form>
    </section>
    <script>
        // Get the error value from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');

        // Display success or failure message based on the error value
        if (error === '0') {
            const successMessage = document.createElement('p');
            successMessage.textContent = 'Thank you for donating!';
            successMessage.style.color = 'green';
            successMessage.style.textAlign = 'center';
            document.body.appendChild(successMessage);
            setTimeout(function() {
                document.body.removeChild(successMessage);
            }, 3000);
        } else if (error === '1') {
            const errorMessage = document.createElement('p');
            errorMessage.textContent = 'Failed to submit the donation.';
            errorMessage.style.color = 'red';
            errorMessage.style.textAlign = 'center';
            document.body.appendChild(errorMessage);
            setTimeout(function() {
                document.body.removeChild(errorMessage);
            }, 3000);
        }
    </script>
    <script src="../styles/bootstrap/js/bootstrap.min.js"></script>
</main>
    <footer class="a_footer" id="a_footer">
      <div id="a_footerItems">
         <span>© 2024 LBC</span>
           <ul>
           <li>Privacy and Cookies</li>
           <li>Content Policy</li>
           <li>Terms of Use</li>
           <li>Feedback</li>
           </ul>
      </div>
    </footer>
</body>
</html>
